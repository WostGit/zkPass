name: "zkPass VOLE-ZK Smoke Test"
on: workflow_dispatch

jobs:
  zkpass-verification:
    runs-on: ubuntu-latest
    steps:
      - name: 🟢 1. Setup & Install SDK
        run: |
          mkdir zkpass-test && cd zkpass-test
          npm init -y
          # 2026 standard package for JS/Node environments
          npm install @zkpass/transgate-js-sdk
          
          # Create the test script inside the same folder
          cat <<EOF > test-zkpass.js
          const { Verifier } = require('@zkpass/transgate-js-sdk');

          async function run() {
            console.log("--- Starting zkPass 2026 Verification ---");
            
            const appId = "6a5c3e21-0b8d-4f9e-bd7a-9c1234567890";
            const verifier = new Verifier(appId);

            // Mocking a 2026 VOLEitH proof structure
            const mockProof = {
              taskId: "task-001",
              schemaId: "github-contributions",
              uParam: "PQ-safe-u",
              vParam: "PQ-safe-v",
              publicFields: [{ name: "username", value: "OpenClaw-Dev" }],
              allocatorSignature: "0x123",
              validatorSignature: "0x456"
            };

            try {
              console.log("🔍 Running Quantum-Safe Math Check...");
              const result = await verifier.verifyProof(mockProof);
              console.log("Result:", result ? "✅ Valid" : "⚠️ Rejected (Mock)");
            } catch (e) {
              if (e.message.toLowerCase().includes("signature") || e.message.toLowerCase().includes("invalid")) {
                console.log("✅ SDK LIVE: The verifier logic caught the invalid mock signature.");
              } else {
                console.error("❌ SDK Error:", e.message);
                process.exit(1);
              }
            }
          }
          run();
          EOF

      - name: 🛡️ 2. Execute Smoke Test
        run: |
          cd zkpass-test
          node test-zkpass.js
